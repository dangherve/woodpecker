---
kind: pipeline
type: exec
name: rebase

platform:
  os: linux
  arch: amd64

trigger:
    branch:
        exclude:
            - main

steps:
  - name: sync repo
    commands:
      - ./buildTools/mainBranch.sh
      - ./buildTools/rebase.sh
      - git push --force --set-upstream origin main

node:
  internet: high
